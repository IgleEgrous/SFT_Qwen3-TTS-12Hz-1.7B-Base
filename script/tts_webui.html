<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen3-TTS WebUI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            color: #7dd3fc;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 32px;
        }

        .card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 0.95rem;
            padding: 12px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #7dd3fc;
        }

        textarea::placeholder {
            color: #475569;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            align-items: center;
        }

        select {
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #e0e0e0;
            padding: 8px 12px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: #7dd3fc;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #2563eb;
        }

        button:disabled {
            background: #1e3a5f;
            color: #64748b;
            cursor: not-allowed;
        }

        .audio-section {
            display: none;
        }

        .audio-section.active {
            display: block;
        }

        audio {
            width: 100%;
            margin-top: 12px;
            border-radius: 8px;
        }

        .audio-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .btn-secondary {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 8px 16px;
            border-radius: 8px;
            color: #94a3b8;
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: #273549;
            color: #e0e0e0;
        }

        .status {
            text-align: center;
            color: #64748b;
            font-size: 0.8rem;
            margin-top: 8px;
            min-height: 20px;
        }

        .status.error {
            color: #f87171;
        }

        .status.success {
            color: #4ade80;
        }

        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #3b82f6;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .model-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #0f0f1a;
            border-radius: 8px;
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 16px;
        }

        .model-info span {
            color: #7dd3fc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Qwen3-TTS WebUI</h1>
        <p class="subtitle">伊蕾娜 (Elaina) 音色 · 无需参考音频</p>

        <div class="model-info">
            <span>API: http://localhost:8000</span>
            <span id="modelStatus">检查连接...</span>
        </div>

        <div class="card">
            <label>文本</label>
            <textarea id="textInput" placeholder="在这里输入文本...">この魔女の証であるブローチを付け、灰色の髪を靡かせ、その美しさと才能の輝きに太陽さえも思わず目を細めてしまうほどの美女は、誰でしょうか。そう、私です！</textarea>

            <div class="controls">
                <select id="epochSelect">
                    <option value="">加载中...</option>
                </select>

                <select id="langSelect">
                    <option value="Japanese">日本語</option>
                    <option value="English">English</option>
                    <option value="Chinese">中文</option>
                </select>

                <button id="generateBtn" onclick="generate()">生成</button>
            </div>

            <div class="status" id="status"></div>
        </div>

        <div class="card audio-section" id="audioSection">
            <label>结果</label>
            <audio id="audioPlayer" controls></audio>
            <div class="audio-actions">
                <a id="downloadBtn" class="btn-secondary" download>⬇ 下载 WAV</a>
                <button class="btn-secondary" onclick="copyUrl()">📋 复制链接</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let currentBlobUrl = null;

        async function checkModels() {
            try {
                const res = await fetch(`${API_BASE}/models`);
                const data = await res.json();
                const select = document.getElementById('epochSelect');
                select.innerHTML = '';
                data.epochs.forEach(epoch => {
                    const opt = document.createElement('option');
                    opt.value = epoch;
                    opt.textContent = `Epoch ${epoch}`;
                    select.appendChild(opt);
                });
                document.getElementById('modelStatus').textContent = `已连接 · ${data.epochs.length} 个模型`;
                return data.epochs;
            } catch (e) {
                document.getElementById('modelStatus').textContent = '未连接';
                return [];
            }
        }

        async function generate() {
            const text = document.getElementById('textInput').value.trim();
            const epoch = document.getElementById('epochSelect').value;
            const lang = document.getElementById('langSelect').value;
            const btn = document.getElementById('generateBtn');
            const status = document.getElementById('status');
            const audioSection = document.getElementById('audioSection');

            if (!text) {
                status.textContent = '请输入文本';
                status.className = 'status error';
                return;
            }
            if (!epoch) {
                status.textContent = '请等待模型加载';
                status.className = 'status error';
                return;
            }

            // 清理旧 blob
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = null;
            }

            btn.disabled = true;
            status.innerHTML = '<span class="loading"></span>生成中...';
            status.className = 'status';
            audioSection.classList.remove('active');

            try {
                const res = await fetch(`${API_BASE}/tts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, epoch, language: lang })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || '请求失败');
                }

                const blob = await res.blob();
                currentBlobUrl = URL.createObjectURL(blob);

                const audio = document.getElementById('audioPlayer');
                audio.src = currentBlobUrl;
                audio.play().catch(() => {}); // 自动播放可能被浏览器阻止

                const downloadBtn = document.getElementById('downloadBtn');
                downloadBtn.href = currentBlobUrl;
                downloadBtn.download = `elaina_epoch${epoch}.wav`;

                audioSection.classList.add('active');
                status.textContent = '✅ 生成完成';
                status.className = 'status success';

            } catch (e) {
                status.textContent = '❌ ' + e.message;
                status.className = 'status error';
            } finally {
                btn.disabled = false;
            }
        }

        async function copyUrl() {
            if (currentBlobUrl) {
                await navigator.clipboard.writeText(currentBlobUrl);
                const status = document.getElementById('status');
                status.textContent = '链接已复制';
                status.className = 'status success';
                setTimeout(() => {
                    status.textContent = '✅ 生成完成';
                }, 1500);
            }
        }

        // 初始化
        checkModels();
        setInterval(checkModels, 30000); // 每30秒检查一次
    </script>
</body>
</html>
